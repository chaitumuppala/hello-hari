workflows:
  hello-hari-phase2:
    name: Hello Hari Android - Phase 2 Audio Recording & Scam Detection
    max_build_duration: 120
    environment:
      vars:
        PACKAGE_NAME: "com.hellohari"
        PHASE: "Phase 2 - Audio Recording"
      node: 18.17.1
      java: 17
    cache:
      cache_paths:
        - ~/.gradle/caches
        - android/.gradle
    scripts:
      - name: Set up Android environment
        script: |
          echo "=== HELLO HARI PHASE 2 BUILD STARTING ==="
          echo "Phase: Audio Recording & Scam Detection"
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
          
      - name: Display Phase 2 Features
        script: |
          echo "🎤 Phase 2 Features Being Built:"
          echo "✅ Real-time call recording"
          echo "✅ Live scam risk analysis"
          echo "✅ Audio pattern detection (simulated)"
          echo "✅ Visual risk meter"
          echo "✅ Enhanced call monitoring"
          echo "✅ Post-call analysis reports"
          
      - name: Verify Source Files
        script: |
          echo "=== VERIFYING SOURCE FILES ==="
          echo "Java source files:"
          find android/app/src/main/java/com/hellohari/ -name "*.java" | sort
          echo ""
          echo "patterns.json:"
          ls -la android/app/src/main/assets/patterns.json
          
      - name: Set Android SDK permissions
        script: |
          echo "=== SETTING ANDROID BUILD PERMISSIONS ==="
          cd android && chmod +x gradlew
          
      - name: Create debug keystore
        script: |
          echo "=== CREATING DEBUG KEYSTORE ==="
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair -v -keystore android/app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Hello Hari Debug,O=Hello Hari,C=US"
            echo "✅ Debug keystore created"
          else
            echo "✅ Debug keystore already exists"
          fi
          
      - name: Gradle Clean
        script: |
          echo "=== CLEANING PREVIOUS BUILD ==="
          cd android
          ./gradlew clean
          echo "✅ Clean completed"
          
      - name: Build Phase 2 APKs
        script: |
          echo "=== BUILDING HELLO HARI PHASE 2 APKs ==="
          echo "🎤 Building with Audio Recording & Scam Detection features..."
          
          cd android
          
          # Build both debug and release
          echo "Building debug APK..."
          ./gradlew assembleDebug --stacktrace
          
          echo "Building release APK..."
          ./gradlew assembleRelease --stacktrace
          
          echo "✅ Build completed successfully"
          
      - name: Verify and Copy APK Files
        script: |
          echo "=== COPYING APK FILES ==="
          cd android
          
          # Find all APK files
          echo "Available APK files:"
          find app/build/outputs -name "*.apk" -type f -exec ls -la {} \;
          
          # Copy with clean names (one debug, one release)
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk ../HelloHari-debug.apk
            echo "✅ Debug APK: HelloHari-debug.apk"
          fi
          
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk ../HelloHari-release-unsigned.apk
            echo "✅ Release APK: HelloHari-release-unsigned.apk"
          fi
          
      - name: Build Summary
        script: |
          echo "=== BUILD SUMMARY ==="
          cd $CM_BUILD_DIR
          
          echo "📱 APK Files:"
          ls -lh HelloHari*.apk 2>/dev/null || echo "No APK files found"
          
          echo ""
          echo "🛡️ HELLO HARI - Scam Call Detector"
          echo "  ASR: Backend WebSocket (primary) + Google Speech (fallback)"
          echo "  Detection: ScamPatternEngine (574 phrases, 13 archetypes, 10 Indian scripts)"
          echo "  UI: Dark theme, shield indicator, live transcription"
          
    artifacts:
      - HelloHari-debug.apk
      - HelloHari-release-unsigned.apk
      
    publishing:
      email:
        recipients:
          - your.email@example.com
        notify:
          success: true
          failure: true
